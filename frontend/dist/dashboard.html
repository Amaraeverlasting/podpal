<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodPal — Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6df0;
      --accent2: #4ecdc4;
      --text: #e8e8f0;
      --muted: #6b7280;
      --green: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--accent2); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-email { font-size: 13px; color: var(--muted); }
    .tier-badge {
      background: rgba(124,109,240,0.15);
      color: var(--accent);
      border: 1px solid rgba(124,109,240,0.3);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tier-badge.beta { background: rgba(78,205,196,0.1); color: var(--accent2); border-color: rgba(78,205,196,0.3); }
    .tier-badge.pro  { background: rgba(124,109,240,0.15); color: var(--accent); border-color: rgba(124,109,240,0.3); }
    .tier-badge.network { background: rgba(240,192,64,0.1); color: #f0c040; border-color: rgba(240,192,64,0.3); }
    .tier-badge.free { background: rgba(107,114,128,0.15); color: var(--muted); border-color: rgba(107,114,128,0.3); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* MAIN */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* PLAN CARD */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      flex-wrap: wrap;
    }
    .plan-info { flex: 1; min-width: 220px; }
    .plan-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .plan-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .plan-features {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .plan-features li {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .plan-features li.active { color: var(--accent2); border-color: rgba(78,205,196,0.2); background: rgba(78,205,196,0.05); }
    .btn-upgrade {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      align-self: flex-start;
    }
    .btn-upgrade:hover { background: #6a5de0; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
    .stat-val {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* SESSION LIST */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-new:hover { background: #6a5de0; }
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .session-card:hover { border-color: rgba(124,109,240,0.3); }
    .session-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .session-guest {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }
    .session-date { font-size: 12px; color: var(--muted); }
    .session-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .session-meta span { display: flex; align-items: center; gap: 4px; }
    .session-actions {
      display: none;
      margin-top: 16px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .session-card.open .session-actions { display: flex; }
    .session-detail {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    .session-card.open .session-detail { display: block; }
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .action-btn:hover { background: rgba(124,109,240,0.1); border-color: var(--accent); color: var(--accent); }
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }

    /* UPGRADE MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .modal h2 { font-size: 22px; margin-bottom: 12px; }
    .modal p { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none; border: none; color: var(--muted);
      font-size: 22px; cursor: pointer;
    }

    /* Loading */
    .loading { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 14px; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr; }
      .plan-card { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Pod<span>Pal</span></div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <span class="tier-badge" id="tier-badge"></span>
      <button class="btn-outline" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="main" id="main">
    <div class="loading">Loading your dashboard...</div>
  </div>

  <!-- Upgrade modal -->
  <div class="modal-backdrop" id="upgrade-modal">
    <div class="modal" style="position:relative">
      <button class="modal-close" onclick="closeUpgradeModal()">×</button>
      <div style="font-size:40px;margin-bottom:16px;">⚡</div>
      <h2 id="modal-title">Pro Feature</h2>
      <p id="modal-desc">This feature is available on the Pro plan. Upgrade for $79/mo and unlock everything.</p>
      <button class="btn-upgrade" onclick="startUpgrade()">Upgrade to Pro →</button>
      <p style="margin-top:16px;font-size:12px;color:var(--muted);">Cancel anytime. No lock-in.</p>
    </div>
  </div>

  <script>
    let currentUser = null;
    let dashData = null;

    async function init() {
      try {
        const res = await fetch('/api/dashboard');
        if (res.status === 401) {
          window.location.href = '/login';
          return;
        }
        dashData = await res.json();
        currentUser = dashData.user;
        render(dashData);
      } catch (e) {
        document.getElementById('main').innerHTML = '<div class="loading">Failed to load dashboard. <a href="/login" style="color:var(--accent)">Sign in again</a></div>';
      }
    }

    function render(data) {
      const { user, sessions, stats } = data;
      const tierLabel = { free: 'Free', beta: 'Beta', pro: 'Pro', network: 'Network' }[user.tier] || user.tier;

      // Header
      document.getElementById('user-email').textContent = user.email;
      const badge = document.getElementById('tier-badge');
      badge.textContent = tierLabel;
      badge.className = `tier-badge ${user.tier}`;

      const tierPerks = {
        free:    ['3 sessions/month', 'Basic transcription', 'No guest intel', 'No export'],
        beta:    ['Unlimited sessions ✓', 'Guest intel ✓', 'Export show notes ✓', 'Session summary ✓', 'Transcript clips ✓'],
        pro:     ['Everything in Beta ✓', 'Priority research ✓', 'Question suggester ✓', 'Analytics ✓'],
        network: ['Everything in Pro ✓', '15 seats ✓', 'Admin dashboard ✓', 'White-label (coming) ✓'],
      };
      const perks = tierPerks[user.tier] || tierPerks.free;

      const showUpgrade = user.tier === 'free' || user.tier === 'beta';
      const upgradeLabel = user.tier === 'free' ? 'Upgrade to Beta — $19/mo' : 'Upgrade to Pro — $79/mo';
      const nextTier = user.tier === 'free' ? 'beta' : 'pro';

      const fmtDur = (s) => {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      };

      const sessionsHtml = sessions.length === 0
        ? `<div class="empty-state">
            <h3>No recordings yet</h3>
            <p>Start your first session to see it here.</p>
            <a href="/app" class="btn-new">Start Recording →</a>
           </div>`
        : sessions.map(s => `
            <div class="session-card" onclick="toggleSession(this)">
              <div class="session-header">
                <div class="session-guest">${s.guest || 'Unknown guest'}</div>
                <div class="session-date">${s.date || ''}</div>
              </div>
              <div class="session-meta">
                <span>⏱ ${fmtDur(s.duration_seconds || 0)}</span>
                <span>💬 ${s.topics_count || 0} topics</span>
                ${s.show ? `<span>🎙 ${s.show}</span>` : ''}
              </div>
              <div class="session-detail">
                ${s.show_notes ? `<p style="margin-bottom:8px;color:var(--text);">${s.show_notes}</p>` : ''}
                ${s.transcript_snippets?.length ? `<p style="font-size:12px;font-style:italic;">"${s.transcript_snippets[0]}"</p>` : ''}
              </div>
              <div class="session-actions">
                <a href="/api/session-file/${s.session_id}/export" class="action-btn" onclick="trackFeature(event,'export')">⬇ Download show notes</a>
                <button class="action-btn" onclick="viewTranscript(event,'${s.session_id}')">📄 View transcript</button>
              </div>
            </div>
          `).join('');

      document.getElementById('main').innerHTML = `
        <div class="plan-card">
          <div class="plan-info">
            <div class="plan-name">${tierLabel} Plan</div>
            <div class="plan-desc">${getPlanDesc(user.tier)}</div>
            <ul class="plan-features">
              ${perks.map(p => `<li class="${p.includes('✓') ? 'active' : ''}">${p}</li>`).join('')}
            </ul>
          </div>
          ${showUpgrade ? `<button class="btn-upgrade" onclick="startUpgrade('${nextTier}')">${upgradeLabel}</button>` : ''}
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val">${stats.total_sessions}</div>
            <div class="stat-label">Sessions</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${fmtDur(stats.total_recording_seconds || 0)}</div>
            <div class="stat-label">Recorded</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${stats.posts_generated || 0}</div>
            <div class="stat-label">Posts generated</div>
          </div>
        </div>

        <div class="section-title">
          <span>Your recordings</span>
          <a href="/app" class="btn-new">+ New Session</a>
        </div>
        ${sessionsHtml}
      `;
    }

    function getPlanDesc(tier) {
      return {
        free: 'Up to 3 sessions/month. Upgrade to unlock unlimited access.',
        beta: 'Beta access — full features, price locked at $19/mo for life.',
        pro: 'Pro plan — all features including priority research and analytics.',
        network: 'Network plan — team seats and advanced controls.',
      }[tier] || '';
    }

    function toggleSession(el) {
      el.classList.toggle('open');
    }

    function trackFeature(e, featureName) {
      fetch('/api/analytics/feature', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ feature: featureName }),
      }).catch(() => {});
    }

    function viewTranscript(e, sessionId) {
      e.stopPropagation();
      window.open(`/api/sessions/${sessionId}`, '_blank');
    }

    function showUpgradeModal(title, desc) {
      document.getElementById('modal-title').textContent = title || 'Pro Feature';
      document.getElementById('modal-desc').textContent = desc || 'Upgrade to Pro for $79/mo to unlock this feature.';
      document.getElementById('upgrade-modal').classList.add('open');
    }

    function closeUpgradeModal() {
      document.getElementById('upgrade-modal').classList.remove('open');
    }

    async function startUpgrade(tier) {
      tier = tier || (currentUser?.tier === 'free' ? 'beta' : 'pro');
      const email = currentUser?.email || '';
      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tier, email }),
        });
        const data = await res.json();
        if (data.redirect) window.location.href = data.redirect;
      } catch (e) {
        alert('Could not start checkout. Please try again.');
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    // Close modal on backdrop click
    document.getElementById('upgrade-modal').addEventListener('click', function(e) {
      if (e.target === this) closeUpgradeModal();
    });

    init();
  </script>
</body>
</html>
