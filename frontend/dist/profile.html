<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodPal - Profile</title>
  <style>
    :root {
      --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;
      --border:rgba(255,255,255,0.07);--accent:#7c6df0;
      --accent2:#4ecdc4;--text:#e8e8f0;--muted:#6b7280;--green:#4ade80;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:50;}
    .nav-logo{font-size:18px;font-weight:800;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent2);}
    .nav-links{display:flex;gap:20px;}
    .nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color 0.15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--text);}
    .nav-right{margin-left:auto;}
    .main{max-width:720px;margin:0 auto;padding:40px 24px;}
    .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:32px;}
    .avatar{width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;}
    .profile-name{font-size:22px;font-weight:800;color:var(--text);}
    .profile-email{font-size:14px;color:var(--muted);margin-top:2px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
    .card-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:18px;}
    .field-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .field-row:last-child{margin-bottom:0;}
    .field-label{font-size:12px;color:var(--muted);}
    .field-value{font-size:15px;color:var(--text);font-weight:500;}
    .field-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);width:100%;font-family:inherit;transition:border-color 0.15s;}
    .field-input:focus{outline:none;border-color:var(--accent);}
    select.field-input{cursor:pointer;}
    textarea.field-input{resize:vertical;min-height:80px;}
    .edit-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all 0.15s;}
    .edit-btn:hover{border-color:var(--accent);color:var(--accent);}
    .save-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;}
    .save-btn:hover{background:#6a5de0;}
    .cancel-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;}
    .btn-row{display:flex;gap:10px;margin-top:20px;}
    .tier-badge{background:rgba(107,114,128,0.15);color:var(--muted);border:1px solid rgba(107,114,128,0.3);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
    .tier-badge.beta{background:rgba(78,205,196,0.1);color:var(--accent2);border-color:rgba(78,205,196,0.3);}
    .tier-badge.pro{background:rgba(124,109,240,0.15);color:var(--accent);border-color:rgba(124,109,240,0.3);}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .stat-item{text-align:center;padding:16px;background:var(--surface2);border-radius:12px;}
    .stat-num{font-size:24px;font-weight:800;color:var(--accent);}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.4px;}
    .logout-btn{background:transparent;border:1px solid rgba(255,92,92,0.3);color:#ff5c5c;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;transition:all 0.15s;}
    .logout-btn:hover{background:rgba(255,92,92,0.1);}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;}
    .toast.show{opacity:1;}
    .loading{text-align:center;padding:80px;color:var(--muted);}
    @media(max-width:480px){.stats-row{grid-template-columns:1fr};}
  </style>
</head>
<body>
  <nav>
    <a href="/app" class="nav-logo">Pod<span>Pal</span></a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/app">App</a>
      <a href="/profile" class="active">Profile</a>
    </div>
    <div class="nav-right">
      <a href="#" onclick="logout()" style="font-size:12px;color:var(--muted);text-decoration:none;">Logout</a>
    </div>
  </nav>

  <div class="main" id="main"><div class="loading">Loading...</div></div>
  <div class="toast" id="toast"></div>

  <script>
    let profileData = null;
    let statsData   = null;
    let editing     = false;

    async function init() {
      try {
        const [pRes, sRes] = await Promise.all([
          fetch('/api/profile'),
          fetch('/api/profile/stats'),
        ]);
        if (pRes.status === 401) { window.location.href = '/login'; return; }
        profileData = await pRes.json();
        statsData   = sRes.ok ? await sRes.json() : {};
        render();
      } catch (e) {
        document.getElementById('main').innerHTML =
          '<div class="loading">Failed to load profile. <a href="/login" style="color:var(--accent)">Sign in</a></div>';
      }
    }

    function initials(name, email) {
      if (name) return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      return (email || 'U')[0].toUpperCase();
    }

    function render() {
      const p  = profileData || {};
      const s  = statsData   || {};
      const tier = p.tier || 'free';
      const tierLabel = { free:'Free', beta:'Beta', pro:'Pro', network:'Network' }[tier] || tier;

      const showNotes = p.show_notes_generated || s.show_notes_generated || 0;

      document.getElementById('main').innerHTML = `
        <div class="profile-header">
          <div class="avatar">${initials(p.name, p.email)}</div>
          <div>
            <div class="profile-name">${p.name || p.email || 'Your Profile'}</div>
            <div class="profile-email">${p.email || ''}</div>
          </div>
        </div>

        <div class="card" id="profile-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div class="card-title" style="margin-bottom:0">Show details</div>
            <button class="edit-btn" id="edit-toggle-btn" onclick="toggleEdit()">Edit</button>
          </div>
          <div id="profile-view">
            <div class="field-row"><div class="field-label">Name</div><div class="field-value">${p.name || '-'}</div></div>
            <div class="field-row"><div class="field-label">Podcast / show name</div><div class="field-value">${p.show_name || '-'}</div></div>
            <div class="field-row"><div class="field-label">Episode frequency</div><div class="field-value">${p.episode_frequency || '-'}</div></div>
            <div class="field-row"><div class="field-label">Show description</div><div class="field-value">${p.show_description || '-'}</div></div>
          </div>
          <div id="profile-edit" style="display:none;">
            <div class="field-row">
              <label class="field-label">First name</label>
              <input id="inp-name" class="field-input" value="${p.name || ''}" placeholder="Your first name" />
            </div>
            <div class="field-row">
              <label class="field-label">Podcast / show name</label>
              <input id="inp-show" class="field-input" value="${p.show_name || ''}" placeholder="My Podcast" />
            </div>
            <div class="field-row">
              <label class="field-label">Episode frequency</label>
              <select id="inp-freq" class="field-input">
                <option value="">Select...</option>
                ${['Daily','Weekly','Bi-weekly','Monthly'].map(f =>
                  `<option value="${f}" ${p.episode_frequency === f ? 'selected' : ''}>${f}</option>`
                ).join('')}
              </select>
            </div>
            <div class="field-row">
              <label class="field-label">Show description (optional)</label>
              <textarea id="inp-desc" class="field-input">${p.show_description || ''}</textarea>
            </div>
            <div class="btn-row">
              <button class="save-btn" onclick="saveProfile()">Save changes</button>
              <button class="cancel-btn" onclick="toggleEdit()">Cancel</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Subscription</div>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <span class="tier-badge ${tier}">${tierLabel}</span>
            ${tier === 'free' ? '<span style="font-size:13px;color:var(--muted)">Free trial - 3 sessions, 7 days</span>' : ''}
            ${tier === 'beta' ? '<span style="font-size:13px;color:var(--muted)">Beta - $19/mo</span>' : ''}
            ${tier === 'free' ? '<button class="save-btn" onclick="upgrade()" style="margin-left:auto;padding:8px 18px;font-size:13px">Upgrade - $19/mo</button>' : ''}
          </div>
        </div>

        <div class="card">
          <div class="card-title">Your stats</div>
          <div class="stats-row">
            <div class="stat-item"><div class="stat-num">${s.total_sessions || p.total_sessions || 0}</div><div class="stat-lbl">Sessions</div></div>
            <div class="stat-item"><div class="stat-num">${s.total_minutes || 0}</div><div class="stat-lbl">Minutes recorded</div></div>
            <div class="stat-item"><div class="stat-num">${s.show_notes_generated || 0}</div><div class="stat-lbl">Show notes</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Account</div>
          <button class="logout-btn" onclick="logout()">Log out</button>
        </div>`;
    }

    function toggleEdit() {
      editing = !editing;
      document.getElementById('profile-view').style.display = editing ? 'none' : '';
      document.getElementById('profile-edit').style.display = editing ? '' : 'none';
      document.getElementById('edit-toggle-btn').textContent = editing ? 'Cancel' : 'Edit';
      if (!editing) render();
    }

    async function saveProfile() {
      const payload = {
        name:              document.getElementById('inp-name').value.trim(),
        show_name:         document.getElementById('inp-show').value.trim(),
        episode_frequency: document.getElementById('inp-freq').value,
        show_description:  document.getElementById('inp-desc').value.trim(),
      };
      try {
        const res = await fetch('/api/profile/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) {
          Object.assign(profileData, payload);
          editing = false;
          render();
          showToast('Profile saved.');
        } else {
          showToast('Save failed. Try again.');
        }
      } catch (e) {
        showToast('Save failed. Try again.');
      }
    }

    async function upgrade() {
      const email = profileData?.email || '';
      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tier: 'beta', email }),
        });
        const d = await res.json();
        if (d.redirect) window.location.href = d.redirect;
      } catch (_) { showToast('Could not start checkout.'); }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
