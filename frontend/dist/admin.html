<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>PodPal — Admin</title>
 <style>
 :root {
 --bg: #0a0a0f;
 --surface: #13131a;
 --surface2: #1a1a24;
 --border: rgba(255,255,255,0.07);
 --accent: #7c6df0;
 --accent2: #4ecdc4;
 --text: #e8e8f0;
 --muted: #6b7280;
 --green: #4ade80;
 --gold: #f0c040;
 }
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100vh;
 }
 header {
 background: var(--surface);
 border-bottom: 1px solid var(--border);
 padding: 0 24px;
 height: 56px;
 display: flex;
 align-items: center;
 gap: 16px;
 position: sticky;
 top: 0;
 z-index: 50;
 }
 .logo { font-size: 18px; font-weight: 800; color: var(--accent); }
 .logo span { color: var(--accent2); }
 .admin-badge {
 background: rgba(240,192,64,0.1);
 color: var(--gold);
 border: 1px solid rgba(240,192,64,0.3);
 border-radius: 6px;
 padding: 3px 10px;
 font-size: 11px;
 font-weight: 700;
 text-transform: uppercase;
 }
 .header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
 .btn-outline {
 background: transparent;
 border: 1px solid var(--border);
 color: var(--muted);
 border-radius: 8px;
 padding: 6px 14px;
 font-size: 13px;
 cursor: pointer;
 }
 .main {
 max-width: 1100px;
 margin: 0 auto;
 padding: 32px 24px;
 }
 .section-title {
 font-size: 15px;
 font-weight: 700;
 color: var(--muted);
 text-transform: uppercase;
 letter-spacing: 0.7px;
 margin-bottom: 16px;
 margin-top: 32px;
 }
 .section-title:first-child { margin-top: 0; }

 /* KPI CARDS */
 .kpi-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
 gap: 16px;
 margin-bottom: 8px;
 }
 .kpi {
 background: var(--surface);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 20px;
 }
 .kpi-val {
 font-size: 34px;
 font-weight: 800;
 color: var(--accent);
 line-height: 1;
 margin-bottom: 6px;
 }
 .kpi-val.green { color: var(--green); }
 .kpi-val.gold { color: var(--gold); }
 .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

 /* TWO-COL */
 .two-col {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 20px;
 margin-top: 4px;
 }
 .card {
 background: var(--surface);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 20px;
 }
 .card-title {
 font-size: 13px;
 font-weight: 700;
 color: var(--muted);
 text-transform: uppercase;
 letter-spacing: 0.5px;
 margin-bottom: 16px;
 }

 /* FEATURES BARS */
 .feat-row {
 display: flex;
 align-items: center;
 gap: 10px;
 margin-bottom: 10px;
 }
 .feat-name { font-size: 13px; width: 130px; flex-shrink: 0; }
 .feat-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); border-radius: 4px; height: 8px; overflow: hidden; }
 .feat-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; }
 .feat-count { font-size: 12px; color: var(--muted); width: 36px; text-align: right; }

 /* LIST */
 .list-row {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 10px 0;
 border-bottom: 1px solid var(--border);
 font-size: 13px;
 }
 .list-row:last-child { border-bottom: none; }
 .list-email { color: var(--text); }
 .list-meta { color: var(--muted); font-size: 12px; }
 .badge-tier {
 border-radius: 5px;
 padding: 2px 8px;
 font-size: 11px;
 font-weight: 700;
 text-transform: uppercase;
 }
 .badge-beta { background: rgba(78,205,196,0.1); color: var(--accent2); }
 .badge-pro { background: rgba(124,109,240,0.1); color: var(--accent); }
 .badge-free { background: rgba(107,114,128,0.1); color: var(--muted); }
 .badge-network { background: rgba(240,192,64,0.1); color: var(--gold); }

 /* FUNNEL */
 .funnel {
 display: flex;
 gap: 0;
 margin-top: 4px;
 }
 .funnel-step {
 flex: 1;
 text-align: center;
 padding: 16px 8px;
 background: rgba(255,255,255,0.03);
 border: 1px solid var(--border);
 border-right: none;
 position: relative;
 }
 .funnel-step:last-child { border-right: 1px solid var(--border); border-radius: 0 10px 10px 0; }
 .funnel-step:first-child { border-radius: 10px 0 0 10px; }
 .funnel-val { font-size: 28px; font-weight: 800; color: var(--accent2); }
 .funnel-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
 .funnel-arrow {
 position: absolute;
 right: -10px; top: 50%;
 transform: translateY(-50%);
 color: var(--muted);
 font-size: 16px;
 z-index: 2;
 }
 .funnel-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

 .loading { text-align: center; padding: 80px; color: var(--muted); }
 @media (max-width: 640px) {
 .two-col { grid-template-columns: 1fr; }
 .kpi-grid { grid-template-columns: 1fr 1fr; }
 }

 /* Comp Access section */
 .comp-section {
 max-width: 1100px;
 margin: 0 auto;
 padding: 0 24px 48px;
 }
 .comp-form {
 background: var(--surface);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 24px;
 display: flex;
 gap: 12px;
 flex-wrap: wrap;
 align-items: flex-end;
 }
 .comp-field { display: flex; flex-direction: column; gap: 5px; }
 .comp-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
 .comp-input {
 background: var(--bg);
 border: 1px solid var(--border);
 color: var(--text);
 border-radius: 7px;
 padding: 8px 12px;
 font-size: 13px;
 outline: none;
 transition: border-color 0.15s;
 }
 .comp-input:focus { border-color: var(--accent); }
 .comp-email { min-width: 220px; }
 select.comp-input { min-width: 100px; }
 .comp-days { width: 80px; }
 .btn-comp {
 background: var(--accent);
 color: white;
 border: none;
 border-radius: 8px;
 padding: 9px 18px;
 font-size: 13px;
 font-weight: 700;
 cursor: pointer;
 }
 .btn-comp:hover { background: #6a5de0; }
 .comp-result {
 margin-top: 12px;
 font-size: 13px;
 color: var(--accent2);
 display: none;
 }
 .comp-result.error { color: var(--red); }

 /* Trial Codes section */
 .code-form {
 background: var(--surface);
 border: 1px solid var(--border);
 border-radius: 14px;
 padding: 24px;
 }
 .code-form-row {
 display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px;
 }
 .codes-table { width: 100%; border-collapse: collapse; font-size: 13px; }
 .codes-table th {
 text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 700;
 color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
 border-bottom: 1px solid var(--border);
 }
 .codes-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
 .codes-table tr:last-child td { border-bottom: none; }
 .used-badge { color: var(--muted); font-style: italic; }
 .unused-badge { color: var(--accent2); font-weight: 600; }
 </style>
</head>
<body>
 <header>
 <div class="logo">Pod<span>Pal</span></div>
 <span class="admin-badge">Admin</span>
 <div class="header-right">
 <a href="/dashboard" class="btn-outline">← Dashboard</a>
 <button class="btn-outline" onclick="logout()">Sign out</button>
 </div>
 </header>

 <div class="main" id="main">
 <div class="loading">Loading analytics...</div>
 </div>

 <!-- Comp Access + Trial Codes (static, always visible to admin) -->
 <div class="comp-section">

 <div class="section-title" style="margin-top:32px;">Give Free Access</div>
 <div class="comp-form">
 <div class="comp-field">
 <label class="comp-label">Email</label>
 <input class="comp-input comp-email" id="comp-email" type="email" placeholder="guest@example.com" />
 </div>
 <div class="comp-field">
 <label class="comp-label">Tier</label>
 <select class="comp-input" id="comp-tier">
 <option value="beta">Beta</option>
 <option value="pro">Pro</option>
 </select>
 </div>
 <div class="comp-field">
 <label class="comp-label">Days</label>
 <input class="comp-input comp-days" id="comp-days" type="number" value="30" min="1" max="365" />
 </div>
 <button class="btn-comp" onclick="grantComp()">Grant Access</button>
 </div>
 <div class="comp-result" id="comp-result"></div>

 <div class="section-title" style="margin-top:32px;">Trial Codes</div>
 <div class="code-form">
 <div class="code-form-row">
 <div class="comp-field">
 <label class="comp-label">Code</label>
 <input class="comp-input" id="code-name" type="text" placeholder="e.g. FRIEND2026" style="text-transform:uppercase;" />
 </div>
 <div class="comp-field">
 <label class="comp-label">Tier</label>
 <select class="comp-input" id="code-tier">
 <option value="pro">Pro</option>
 <option value="beta">Beta</option>
 </select>
 </div>
 <div class="comp-field">
 <label class="comp-label">Days</label>
 <input class="comp-input comp-days" id="code-days" type="number" value="7" min="1" />
 </div>
 <button class="btn-comp" onclick="createCode()">Create Code</button>
 </div>
 <div id="codes-result" style="font-size:13px;color:var(--accent2);margin-bottom:12px;display:none;"></div>
 <table class="codes-table" id="codes-table">
 <thead>
 <tr>
 <th>Code</th><th>Tier</th><th>Days</th><th>Status</th><th>Used By</th><th>Created</th>
 </tr>
 </thead>
 <tbody id="codes-body">
 <tr><td colspan="6" style="color:var(--muted);font-style:italic;">Loading...</td></tr>
 </tbody>
 </table>
 </div>

 </div>

 <script>
 async function init() {
 try {
 const res = await fetch('/api/admin/stats');
 if (res.status === 401) { window.location.href = '/login'; return; }
 if (res.status === 403) { document.getElementById('main').innerHTML = '<div class="loading">Access denied.</div>'; return; }
 const d = await res.json();
 render(d);
 } catch (e) {
 document.getElementById('main').innerHTML = `<div class="loading">Error loading stats: ${e.message}</div>`;
 }
 }

 function fmt(n) { return n?.toLocaleString() ?? '0'; }
 function pct(a, b) { return b ? Math.round((a / b) * 100) + '%' : '0%'; }

 function render(d) {
 const u = d.users || {};
 const s = d.sessions || {};
 const f = d.features || {};
 const p = d.payments || {};
 const fn = d.funnel || {};

 // Feature bars
 const maxFeat = Math.max(1, ...Object.values(f));
 const featHtml = Object.entries(f)
 .sort((a, b) => b[1] - a[1])
 .slice(0, 8)
 .map(([name, count]) => `
 <div class="feat-row">
 <div class="feat-name">${name}</div>
 <div class="feat-bar-wrap">
 <div class="feat-bar" style="width:${Math.round((count/maxFeat)*100)}%"></div>
 </div>
 <div class="feat-count">${count}</div>
 </div>
 `).join('') || '<p style="color:var(--muted);font-size:13px;">No feature events yet.</p>';

 // Recent signups
 const signupsHtml = (u.recent_signups || []).map(e => `
 <div class="list-row">
 <span class="list-email">${e.email || '—'}</span>
 <div style="display:flex;gap:8px;align-items:center;">
 <span class="badge-tier badge-${e.tier || 'free'}">${e.tier || 'free'}</span>
 <span class="list-meta">${e.timestamp ? new Date(e.timestamp).toLocaleDateString() : ''}</span>
 </div>
 </div>
 `).join('') || '<p style="color:var(--muted);font-size:13px;">No signups yet.</p>';

 // Recent payments
 const paymentsHtml = (p.recent || []).map(e => `
 <div class="list-row">
 <span class="list-email">${e.email || '—'}</span>
 <div style="display:flex;gap:8px;align-items:center;">
 <span class="badge-tier badge-${e.tier || 'free'}">${e.tier || ''}</span>
 <span class="list-meta">$${e.amount || '0'}</span>
 <span class="list-meta">${e.timestamp ? new Date(e.timestamp).toLocaleDateString() : ''}</span>
 </div>
 </div>
 `).join('') || '<p style="color:var(--muted);font-size:13px;">No payments yet.</p>';

 document.getElementById('main').innerHTML = `
 <div class="section-title">Overview</div>
 <div class="kpi-grid">
 <div class="kpi"><div class="kpi-val">${fmt(u.total)}</div><div class="kpi-label">Total Users</div></div>
 <div class="kpi"><div class="kpi-val green">${fmt(u.active_subscribers)}</div><div class="kpi-label">Active Subscribers</div></div>
 <div class="kpi"><div class="kpi-val gold">$${fmt(u.mrr_usd)}</div><div class="kpi-label">MRR (USD)</div></div>
 <div class="kpi"><div class="kpi-val">${fmt(s.today)}</div><div class="kpi-label">Sessions Today</div></div>
 <div class="kpi"><div class="kpi-val">${fmt(s.this_week)}</div><div class="kpi-label">This Week</div></div>
 <div class="kpi"><div class="kpi-val">${fmt(s.this_month)}</div><div class="kpi-label">This Month</div></div>
 </div>

 <div class="section-title" style="margin-top:32px;">Conversion Funnel</div>
 <div class="funnel">
 <div class="funnel-step">
 <div class="funnel-val">${fmt(fn.visitors)}</div>
 <div class="funnel-label">Visitors</div>
 <div class="funnel-pct">100%</div>
 <span class="funnel-arrow">›</span>
 </div>
 <div class="funnel-step">
 <div class="funnel-val">${fmt(fn.signups)}</div>
 <div class="funnel-label">Signups</div>
 <div class="funnel-pct">${pct(fn.signups, fn.visitors)}</div>
 <span class="funnel-arrow">›</span>
 </div>
 <div class="funnel-step">
 <div class="funnel-val">${fmt(fn.paid)}</div>
 <div class="funnel-label">Paid</div>
 <div class="funnel-pct">${pct(fn.paid, fn.signups)}</div>
 </div>
 </div>

 <div class="section-title" style="margin-top:32px;">Features & Users</div>
 <div class="two-col">
 <div class="card">
 <div class="card-title">Most Used Features</div>
 ${featHtml}
 </div>
 <div class="card">
 <div class="card-title">Recent Signups</div>
 ${signupsHtml}
 </div>
 </div>

 <div class="section-title" style="margin-top:24px;">Payments</div>
 <div class="card">
 <div class="card-title">Recent Payments</div>
 ${paymentsHtml}
 </div>
 `;
 }

 async function logout() {
 await fetch('/api/auth/logout', { method: 'POST' });
 window.location.href = '/login';
 }

 async function grantComp() {
 const email = document.getElementById('comp-email').value.trim();
 const tier = document.getElementById('comp-tier').value;
 const days = parseInt(document.getElementById('comp-days').value, 10);
 const resultEl = document.getElementById('comp-result');
 resultEl.style.display = 'none';
 if (!email) { resultEl.textContent = 'Email required'; resultEl.className = 'comp-result error'; resultEl.style.display = 'block'; return; }
 try {
 const res = await fetch('/api/admin/comp-access', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({ email, tier, days }),
 });
 const d = await res.json();
 if (d.ok) {
 resultEl.className = 'comp-result';
 resultEl.textContent = `Done. ${email} has ${tier} access for ${days} days (expires ${d.expires?.split('T')[0]}).`;
 document.getElementById('comp-email').value = '';
 } else {
 resultEl.className = 'comp-result error';
 resultEl.textContent = d.error || 'Failed';
 }
 resultEl.style.display = 'block';
 } catch(e) {
 resultEl.textContent = 'Request failed: ' + e.message;
 resultEl.className = 'comp-result error';
 resultEl.style.display = 'block';
 }
 }

 async function loadCodes() {
 try {
 const res = await fetch('/api/admin/trial-codes');
 if (!res.ok) return;
 const d = await res.json();
 const tbody = document.getElementById('codes-body');
 const codes = d.codes || [];
 if (!codes.length) {
 tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);font-style:italic;">No codes yet.</td></tr>';
 return;
 }
 tbody.innerHTML = codes.map(c => `
 <tr>
 <td style="font-weight:700;font-family:monospace;">${c.code}</td>
 <td><span class="badge-tier badge-${c.tier}">${c.tier}</span></td>
 <td>${c.days}d</td>
 <td>${c.used ? '<span class="used-badge">used</span>' : '<span class="unused-badge">available</span>'}</td>
 <td style="color:var(--muted);">${c.used_by || '-'}</td>
 <td style="color:var(--muted);">${c.created_at ? c.created_at.split('T')[0] : ''}</td>
 </tr>
 `).join('');
 } catch(e) { /* non-fatal */ }
 }

 async function createCode() {
 const code = document.getElementById('code-name').value.trim().toUpperCase();
 const tier = document.getElementById('code-tier').value;
 const days = parseInt(document.getElementById('code-days').value, 10);
 const resultEl = document.getElementById('codes-result');
 if (!code) { resultEl.textContent = 'Code name required'; resultEl.style.color = 'var(--red)'; resultEl.style.display = 'block'; return; }
 try {
 const res = await fetch('/api/admin/trial-codes', {
 method: 'POST',
 headers: {'Content-Type': 'application/json'},
 body: JSON.stringify({ code, tier, days }),
 });
 const d = await res.json();
 if (d.ok) {
 resultEl.textContent = `Code ${code} created. Share link: ${window.location.origin}/trial?code=${code}`;
 resultEl.style.color = 'var(--accent2)';
 resultEl.style.display = 'block';
 document.getElementById('code-name').value = '';
 loadCodes();
 } else {
 resultEl.textContent = d.error || 'Failed';
 resultEl.style.color = 'var(--red)';
 resultEl.style.display = 'block';
 }
 } catch(e) {
 resultEl.textContent = 'Request failed';
 resultEl.style.color = 'var(--red)';
 resultEl.style.display = 'block';
 }
 }

 init();
 loadCodes();
 </script>
</body>
</html>
